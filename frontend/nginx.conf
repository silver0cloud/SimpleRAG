# ————— nginx.conf —————————————————————————————————————————————————————— 
# Serves the built React app and proxies /api/* to the backend container
# It mirrors exactly what vite.config.js's dev proxy does.
# This is why App.jsx can call fetch('/api/...') unchanged whether it's running under `npm run dev` or inside this container.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: any unknown path falls back to index.html so
    # client-side routing (if you add any later) keeps working.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # "backend" below is the docker-compose service name — Docker's
    # internal DNS resolves it to that container's IP automatically.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;          # generation can take a while
        proxy_buffering off;              # don't buffer the SSE stream
    }
}
