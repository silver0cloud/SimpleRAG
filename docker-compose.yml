# docker-compose.yml — runs the whole app with one command:
#
#   docker compose up --build
#
# Then open http://localhost — nginx serves the built frontend and
# proxies /api/* to the backend container over Docker's internal network.
services:
  backend:
    build: ./backend
    container_name: news-rag-backend
    # Makes NEWS_API_KEY / GEMINI_API_KEY (if set) available inside the
    # container, so you don't have to paste keys into the UI every time.
    # IMPORTANT: this file must exist before `docker compose up`, even if
    # you leave every value blank — run this once first:
    #   cp backend/.env.example backend/.env
    env_file:
      - ./backend/.env
    expose:
      - "8000"   # only reachable from other containers, not the host
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: news-rag-frontend
    ports:
      - "80:80"  # http://localhost
    depends_on:
      - backend
    restart: unless-stopped
